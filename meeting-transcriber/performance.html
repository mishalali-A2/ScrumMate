<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScrumMate - Trello Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <style>
        :root {
            --bg: #f4f7fb;
            --bg-elevated: #ffffff;
            --bg-panel: #ffffff;
            --bg-hover: rgba(79, 124, 255, 0.05);
            --line: rgba(15, 23, 42, 0.08);
            --line-strong: rgba(15, 23, 42, 0.14);
            --text-1: #111827;
            --text-2: #475467;
            --text-3: #667085;
            --text-4: #98a2b3;
            --accent: #4f7cff;
            --accent-2: #5de4ff;
            --accent-soft: rgba(79, 124, 255, 0.18);
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --radius: 12px;
            --glow: 0 0 0 1px rgba(79, 124, 255, 0.14), 0 12px 32px rgba(79, 124, 255, 0.1);
            --transition: 140ms ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: var(--text-1);
            background: linear-gradient(180deg, #fbfdff 0%, #f4f7fb 100%);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            letter-spacing: -0.01em;
        }

        .header {
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--line);
            padding: 0 24px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-shrink: 0;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: inherit;
        }

        .brand img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        .brand-text h1 {
            font-size: 14px;
            font-weight: 700;
            margin: 0;
            color: var(--text-1);
        }

        .brand-text p {
            font-size: 11px;
            color: var(--text-4);
            margin: 2px 0 0;
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 24px;
            flex: 1;
            justify-content: center;
        }

        .nav a {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-3);
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 8px;
            transition: all var(--transition);
        }

        .nav a:hover {
            color: var(--text-1);
            background: rgba(79, 124, 255, 0.08);
        }

        .nav a.active {
            color: var(--accent);
            font-weight: 600;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .refresh-btn {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.82);
            color: var(--text-3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition);
        }

        .refresh-btn:hover {
            color: var(--text-1);
            border-color: rgba(79, 124, 255, 0.24);
            background: rgba(79, 124, 255, 0.08);
        }

        .refresh-btn.loading {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .auto-refresh-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-3);
        }

        .toggle-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .main {
            flex: 1;
            overflow-y: auto;
            padding: 26px 26px 40px;
        }

        .main::-webkit-scrollbar { width: 6px; }
        .main::-webkit-scrollbar-thumb {
            background: rgba(124, 138, 165, 0.32);
            border-radius: 999px;
        }

        .page-header {
            margin-bottom: 28px;
        }

        .eyebrow {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--accent-2);
            margin-bottom: 8px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 8px;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .page-subtitle {
            font-size: 13px;
            color: var(--text-3);
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }

        .metric-card {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(247, 250, 255, 0.98));
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 16px;
            transition: all var(--transition);
        }

        .metric-card:hover {
            border-color: rgba(79, 124, 255, 0.18);
            box-shadow: 0 0 0 1px rgba(79, 124, 255, 0.08), 0 14px 30px rgba(79, 124, 255, 0.08);
            transform: translateY(-1px);
        }

        .metric-label {
            font-size: 11px;
            color: var(--text-4);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .metric-value {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.06em;
            color: var(--text-1);
            margin-bottom: 8px;
        }

        .metric-footer {
            font-size: 11px;
            color: var(--text-4);
        }

        .section {
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-1);
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        .boards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }

        .board-card {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(250, 252, 255, 0.98));
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 18px;
            transition: all var(--transition);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            min-height: 300px;
        }

        .board-card:hover {
            border-color: rgba(79, 124, 255, 0.18);
            box-shadow: var(--glow);
            transform: translateY(-2px);
        }

        .board-name {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-1);
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            line-height: 1.4;
            flex-shrink: 0;
        }

        .board-name::before {
            content: '📋';
            font-size: 16px;
            flex-shrink: 0;
        }

        .board-completion {
            width: 100%;
            background: rgba(79, 124, 255, 0.1);
            border-radius: 10px;
            padding: 10px;
        }

        .progress-label {
            font-size: 11px;
            color: var(--text-3);
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            font-weight: 600;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(79, 124, 255, 0.1);
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            border-radius: 999px;
            transition: width 0.6s ease;
        }

        .board-chart-container {
            flex: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 140px;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
        }

        /* MODAL OVERLAY */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-elevated);
            border-radius: 20px;
            padding: 32px;
            max-width: 1200px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            padding-bottom: 18px;
            border-bottom: 1px solid var(--line);
        }

        .modal-title {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-1);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .modal-close {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.82);
            color: var(--text-3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--transition);
            flex-shrink: 0;
        }

        .modal-close:hover {
            color: var(--text-1);
            border-color: rgba(79, 124, 255, 0.24);
            background: rgba(79, 124, 255, 0.08);
        }

        .modal-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .modal-stat {
            background: rgba(79, 124, 255, 0.04);
            border: 1px solid rgba(79, 124, 255, 0.1);
            border-radius: 12px;
            padding: 14px;
        }

        .modal-stat-label {
            font-size: 10px;
            color: var(--text-4);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .modal-stat-value {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-1);
        }

        .modal-charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            margin-bottom: 24px;
        }

        .modal-chart-wrapper {
            background: #ffffff;
            border: 1px solid rgba(79, 124, 255, 0.12);
            border-radius: 16px;
            padding: 16px;
            position: relative;
        }

        .chart-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-1);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chart-title::before {
            content: '';
            width: 3px;
            height: 14px;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            border-radius: 1px;
        }

        .chart-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 280px;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 40px 20px;
            color: var(--text-4);
            font-size: 14px;
        }

        .loading-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(79, 124, 255, 0.2);
            border-top-color: var(--accent);
            border-radius: 999px;
            animation: spin 1s linear infinite;
        }

        .error {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 12px;
            padding: 16px;
            color: #b91c1c;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .error-icon {
            margin-right: 8px;
        }

        .last-updated {
            font-size: 11px;
            color: var(--text-4);
            margin-top: 12px;
            text-align: center;
        }

        @media (max-width: 1200px) {
            .metrics-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .modal-stats {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .modal-charts-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .header {
                flex-wrap: wrap;
                padding: 12px;
                height: auto;
                min-height: 58px;
            }

            .nav {
                order: 3;
                width: 100%;
                margin-top: 12px;
            }

            .metrics-grid {
                grid-template-columns: 1fr;
            }

            .boards-grid {
                grid-template-columns: 1fr;
            }

            .page-title {
                font-size: 20px;
            }

            .modal-content {
                padding: 20px;
            }

            .modal-stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .modal-charts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="dashboard.html" class="brand">
            <img src="logo_gallery/Logo.png" alt="ScrumMate">
            <div class="brand-text">
                <h1>ScrumMate</h1>
                <p>Analytics</p>
            </div>
        </a>

        <nav class="nav">
            <a href="dashboard.html">Dashboard</a>
            <a href="meetings.html">Meetings</a>
            <a href="projects.html">Projects</a>
            <a href="performance.html" class="active">Analytics</a>
        </nav>

        <div class="controls">
            <label class="auto-refresh-toggle">
                <input type="checkbox" id="autoRefreshToggle" class="toggle-checkbox">
                <span>Auto-refresh</span>
            </label>
            <button class="refresh-btn" id="refreshBtn" title="Refresh analytics">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1.5 4a6.5 6.5 0 1 0 6.5-6.5"></path>
                    <path d="M8 1.5V5.5h4"></path>
                </svg>
            </button>
        </div>
    </header>

    <main class="main">
        <div class="page-header">
            <div class="eyebrow">Trello Integration</div>
            <h1 class="page-title">Board Analytics</h1>
            <p class="page-subtitle">Real-time insights from all your Trello boards • Click any board to see detailed charts</p>
        </div>

        <div id="errorContainer"></div>
        <div id="loadingContainer" class="loading" style="display: none;">
            <div class="loading-spinner"></div>
            <span>Loading analytics...</span>
        </div>

        <div id="analyticsContainer" style="display: none;">
            <!-- Workspace Metrics -->
            <div class="metrics-grid" id="metricsGrid"></div>

            <!-- Individual Boards -->
            <div class="section">
                <div class="section-title">Board Breakdown</div>
                <div class="boards-grid" id="boardsGrid"></div>
            </div>

            <div class="last-updated" id="lastUpdated"></div>
        </div>
    </main>

    <!-- MODAL OVERLAY -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalBoardName">Board Details</div>
                <button class="modal-close" id="modalCloseBtn">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M5 5l10 10M15 5l-10 10"></path>
                    </svg>
                </button>
            </div>

            <div class="modal-stats" id="modalStats"></div>

            <div class="modal-charts-grid" id="modalChartsGrid"></div>
        </div>
    </div>

    <script>
        const refreshBtn = document.getElementById('refreshBtn');
        const autoRefreshToggle = document.getElementById('autoRefreshToggle');
        const errorContainer = document.getElementById('errorContainer');
        const loadingContainer = document.getElementById('loadingContainer');
        const analyticsContainer = document.getElementById('analyticsContainer');
        const metricsGrid = document.getElementById('metricsGrid');
        const boardsGrid = document.getElementById('boardsGrid');
        const lastUpdated = document.getElementById('lastUpdated');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalCloseBtn = document.getElementById('modalCloseBtn');

        let autoRefreshInterval = null;
        let currentData = null;

        async function fetchAnalytics() {
            try {
                refreshBtn.classList.add('loading');
                errorContainer.innerHTML = '';
                loadingContainer.style.display = 'flex';

                const response = await fetch('/api/trello/boards-detailed');
                const data = await response.json();

                loadingContainer.style.display = 'none';

                if (!response.ok || !data.success) {
                    showError(data.error || 'Failed to load analytics');
                    return;
                }

                currentData = data;
                analyticsContainer.style.display = 'block';
                renderMetrics(data);
                renderBoards(data);
                updateLastFetched();

                refreshBtn.classList.remove('loading');
            } catch (error) {
                loadingContainer.style.display = 'none';
                analyticsContainer.style.display = 'block';
                showError(error.message || 'Connection error');
                refreshBtn.classList.remove('loading');
            }
        }

        function renderMetrics(data) {
            const t = data.totals.workspace;
            metricsGrid.innerHTML = `
                <div class="metric-card">
                    <div class="metric-label">Total Tasks</div>
                    <div class="metric-value">${t.cards}</div>
                    <div class="metric-footer">${data.workspace.boardCount} boards</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Completed</div>
                    <div class="metric-value">${t.done}</div>
                    <div class="metric-footer">${data.totals.completionPercent}% complete</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">In Progress</div>
                    <div class="metric-value">${t.open}</div>
                    <div class="metric-footer">${t.cards ? Math.round(100 * t.open / t.cards) : 0}% of total</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Blocked</div>
                    <div class="metric-value">${t.blocked}</div>
                    <div class="metric-footer">Requires attention</div>
                </div>
            `;
        }

        function renderBoards(data) {
            boardsGrid.innerHTML = data.workspace.boardsDetail.map((board, boardIndex) => {
                const m = board.metrics;
                const completion = m.total ? Math.round(100 * m.done / m.total) : 0;
                return `
                    <div class="board-card" onclick="openBoardDetails(${boardIndex})">
                        <div class="board-name">${board.name}</div>
                        
                        <div class="board-chart-container">
                            <canvas id="pieChart-${boardIndex}"></canvas>
                        </div>

                        <div class="board-completion">
                            <div class="progress-label">
                                <span>Completion</span>
                                <span>${completion}%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${completion}%"></div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // Render only pie charts for board cards
            data.workspace.boardsDetail.forEach((board, boardIndex) => {
                renderBoardPieChart(board, boardIndex);
            });
        }

        function renderBoardPieChart(board, boardIndex) {
            const m = board.metrics;
            
            const pieCtx = document.getElementById(`pieChart-${boardIndex}`);
            if (pieCtx) {
                new Chart(pieCtx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Done', 'In Progress', 'Blocked'],
                        datasets: [{
                            data: [m.done, m.open, m.blocked],
                            backgroundColor: [
                                'rgba(34, 197, 94, 0.9)',
                                'rgba(245, 158, 11, 0.9)',
                                'rgba(239, 68, 68, 0.9)'
                            ],
                            borderColor: '#ffffff',
                            borderWidth: 2,
                            borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: 'rgba(0, 0, 0, 0.9)',
                                padding: 10,
                                bodyFont: { size: 11 },
                                borderColor: 'rgba(79, 124, 255, 0.3)',
                                borderWidth: 1
                            }
                        }
                    }
                });
            }
        }

        function openBoardDetails(boardIndex) {
            if (!currentData) return;

            const board = currentData.workspace.boardsDetail[boardIndex];
            const m = board.metrics;

            // Set modal header
            document.getElementById('modalBoardName').textContent = `📋 ${board.name}`;

            // Set stats
            document.getElementById('modalStats').innerHTML = `
                <div class="modal-stat">
                    <div class="modal-stat-label">Total Tasks</div>
                    <div class="modal-stat-value">${m.total}</div>
                </div>
                <div class="modal-stat">
                    <div class="modal-stat-label">Completed</div>
                    <div class="modal-stat-value">${m.done}</div>
                </div>
                <div class="modal-stat">
                    <div class="modal-stat-label">In Progress</div>
                    <div class="modal-stat-value">${m.open}</div>
                </div>
                <div class="modal-stat">
                    <div class="modal-stat-label">Blocked</div>
                    <div class="modal-stat-value">${m.blocked}</div>
                </div>
            `;

            // Set charts grid with 4 charts
            document.getElementById('modalChartsGrid').innerHTML = `
                <div class="modal-chart-wrapper">
                    <div class="chart-title">Task Distribution</div>
                    <div class="chart-container">
                        <canvas id="modal-pieChart-${boardIndex}"></canvas>
                    </div>
                </div>
                <div class="modal-chart-wrapper">
                    <div class="chart-title">Burndown Trend</div>
                    <div class="chart-container">
                        <canvas id="modal-burndownChart-${boardIndex}"></canvas>
                    </div>
                </div>
                <div class="modal-chart-wrapper">
                    <div class="chart-title">Cumulative Flow</div>
                    <div class="chart-container">
                        <canvas id="modal-cumulativeChart-${boardIndex}"></canvas>
                    </div>
                </div>
                <div class="modal-chart-wrapper">
                    <div class="chart-title">Burnup Progress</div>
                    <div class="chart-container">
                        <canvas id="modal-burnupChart-${boardIndex}"></canvas>
                    </div>
                </div>
            `;

            // Render all charts in modal
            setTimeout(() => {
                renderModalCharts(board, boardIndex);
            }, 0);

            // Show modal
            modalOverlay.classList.add('active');
        }

        function renderModalCharts(board, boardIndex) {
            const m = board.metrics;

            // Pie Chart
            const pieCtx = document.getElementById(`modal-pieChart-${boardIndex}`);
            if (pieCtx) {
                new Chart(pieCtx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Done', 'In Progress', 'Blocked'],
                        datasets: [{
                            data: [m.done, m.open, m.blocked],
                            backgroundColor: [
                                'rgba(34, 197, 94, 0.9)',
                                'rgba(245, 158, 11, 0.9)',
                                'rgba(239, 68, 68, 0.9)'
                            ],
                            borderColor: '#ffffff',
                            borderWidth: 3,
                            borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: {
                                    font: { size: 12, weight: '600' },
                                    padding: 16,
                                    usePointStyle: true,
                                    color: 'var(--text-2)',
                                    generateLabels: (chart) => {
                                        const data = chart.data;
                                        return data.labels.map((label, i) => ({
                                            text: `${label}: ${data.datasets[0].data[i]}`,
                                            fillStyle: data.datasets[0].backgroundColor[i],
                                            hidden: false,
                                            index: i,
                                            pointStyle: 'circle'
                                        }));
                                    }
                                }
                            },
                            tooltip: {
                                backgroundColor: 'rgba(0, 0, 0, 0.9)',
                                padding: 12,
                                titleFont: { size: 12, weight: 'bold' },
                                bodyFont: { size: 11 },
                                borderColor: 'rgba(79, 124, 255, 0.3)',
                                borderWidth: 1
                            }
                        }
                    }
                });
            }

            // Burndown Chart
            const burndownCtx = document.getElementById(`modal-burndownChart-${boardIndex}`);
            if (burndownCtx) {
                const days = generateSprintDays(14);
                const idealLine = generateIdealBurndown(m.total, 14);
                const actualLine = generateActualBurndown(m.total, m.done, 14);
                
                new Chart(burndownCtx, {
                    type: 'line',
                    data: {
                        labels: days,
                        datasets: [
                            {
                                label: 'Ideal',
                                data: idealLine,
                                borderColor: 'rgba(79, 124, 255, 0.7)',
                                borderDash: [6, 4],
                                fill: false,
                                tension: 0.4,
                                pointRadius: 3,
                                pointBackgroundColor: 'rgba(79, 124, 255, 0.8)',
                                pointBorderColor: '#ffffff',
                                pointBorderWidth: 2,
                                borderWidth: 2.5
                            },
                            {
                                label: 'Actual',
                                data: actualLine,
                                borderColor: 'rgba(34, 197, 94, 0.85)',
                                fill: true,
                                backgroundColor: 'rgba(34, 197, 94, 0.08)',
                                tension: 0.4,
                                pointRadius: 4,
                                pointBackgroundColor: 'rgba(34, 197, 94, 0.9)',
                                pointBorderColor: '#ffffff',
                                pointBorderWidth: 2,
                                borderWidth: 2.5
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            legend: {
                                position: 'top',
                                labels: {
                                    font: { size: 11, weight: '600' },
                                    padding: 12,
                                    usePointStyle: true,
                                    color: 'var(--text-2)'
                                }
                            },
                            tooltip: {
                                backgroundColor: 'rgba(0, 0, 0, 0.9)',
                                padding: 10,
                                titleFont: { size: 11, weight: 'bold' },
                                bodyFont: { size: 10 },
                                borderColor: 'rgba(79, 124, 255, 0.3)',
                                borderWidth: 1
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                max: m.total,
                                ticks: { font: { size: 10 }, color: 'var(--text-3)' },
                                grid: { color: 'rgba(79, 124, 255, 0.06)' }
                            },
                            x: {
                                ticks: { font: { size: 9 }, color: 'var(--text-3)' },
                                grid: { display: false }
                            }
                        }
                    }
                });
            }

            // Cumulative Flow Chart
            const cumulativeCtx = document.getElementById(`modal-cumulativeChart-${boardIndex}`);
            if (cumulativeCtx) {
                const days = generateSprintDays(14);
                const doneFlow = generateCumulativeFlow(m.done, 14);
                const inProgressFlow = generateCumulativeFlow(m.open, 14);
                const blockedFlow = generateCumulativeFlow(m.blocked, 14);
                
                new Chart(cumulativeCtx, {
                    type: 'line',
                    data: {
                        labels: days,
                        datasets: [
                            {
                                label: 'Done',
                                data: doneFlow,
                                borderColor: 'rgba(34, 197, 94, 0.85)',
                                backgroundColor: 'rgba(34, 197, 94, 0.12)',
                                fill: true,
                                tension: 0.4,
                                pointRadius: 3,
                                pointBackgroundColor: 'rgba(34, 197, 94, 0.8)',
                                pointBorderColor: '#ffffff',
                                pointBorderWidth: 1.5,
                                borderWidth: 2
                            },
                            {
                                label: 'In Progress',
                                data: inProgressFlow,
                                borderColor: 'rgba(245, 158, 11, 0.85)',
                                backgroundColor: 'rgba(245, 158, 11, 0.12)',
                                fill: true,
                                tension: 0.4,
                                pointRadius: 3,
                                pointBackgroundColor: 'rgba(245, 158, 11, 0.8)',
                                pointBorderColor: '#ffffff',
                                pointBorderWidth: 1.5,
                                borderWidth: 2
                            },
                            {
                                label: 'Blocked',
                                data: blockedFlow,
                                borderColor: 'rgba(239, 68, 68, 0.85)',
                                backgroundColor: 'rgba(239, 68, 68, 0.12)',
                                fill: true,
                                tension: 0.4,
                                pointRadius: 3,
                                pointBackgroundColor: 'rgba(239, 68, 68, 0.8)',
                                pointBorderColor: '#ffffff',
                                pointBorderWidth: 1.5,
                                borderWidth: 2
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            legend: {
                                position: 'top',
                                labels: {
                                    font: { size: 11, weight: '600' },
                                    padding: 12,
                                    usePointStyle: true,
                                    color: 'var(--text-2)'
                                }
                            },
                            tooltip: {
                                backgroundColor: 'rgba(0, 0, 0, 0.9)',
                                padding: 10,
                                titleFont: { size: 11, weight: 'bold' },
                                bodyFont: { size: 10 },
                                borderColor: 'rgba(79, 124, 255, 0.3)',
                                borderWidth: 1
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: { font: { size: 10 }, color: 'var(--text-3)' },
                                grid: { color: 'rgba(79, 124, 255, 0.06)' }
                            },
                            x: {
                                ticks: { font: { size: 9 }, color: 'var(--text-3)' },
                                grid: { display: false }
                            }
                        }
                    }
                });
            }

            // Burnup Chart
            const burnupCtx = document.getElementById(`modal-burnupChart-${boardIndex}`);
            if (burnupCtx) {
                const days = generateSprintDays(14);
                const completed = generateBurnupCompleted(m.done, 14);
                const total = generateBurnupTotal(m.total, 14);
                
                new Chart(burnupCtx, {
                    type: 'line',
                    data: {
                        labels: days,
                        datasets: [
                            {
                                label: 'Total Scope',
                                data: total,
                                borderColor: 'rgba(79, 124, 255, 0.7)',
                                backgroundColor: 'transparent',
                                borderDash: [6, 4],
                                tension: 0.4,
                                pointRadius: 3,
                                pointBackgroundColor: 'rgba(79, 124, 255, 0.8)',
                                pointBorderColor: '#ffffff',
                                pointBorderWidth: 2,
                                borderWidth: 2.5
                            },
                            {
                                label: 'Completed',
                                data: completed,
                                borderColor: 'rgba(34, 197, 94, 0.85)',
                                backgroundColor: 'rgba(34, 197, 94, 0.08)',
                                fill: true,
                                tension: 0.4,
                                pointRadius: 4,
                                pointBackgroundColor: 'rgba(34, 197, 94, 0.9)',
                                pointBorderColor: '#ffffff',
                                pointBorderWidth: 2,
                                borderWidth: 2.5
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            legend: {
                                position: 'top',
                                labels: {
                                    font: { size: 11, weight: '600' },
                                    padding: 12,
                                    usePointStyle: true,
                                    color: 'var(--text-2)'
                                }
                            },
                            tooltip: {
                                backgroundColor: 'rgba(0, 0, 0, 0.9)',
                                padding: 10,
                                titleFont: { size: 11, weight: 'bold' },
                                bodyFont: { size: 10 },
                                borderColor: 'rgba(79, 124, 255, 0.3)',
                                borderWidth: 1
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: { font: { size: 10 }, color: 'var(--text-3)' },
                                grid: { color: 'rgba(79, 124, 255, 0.06)' }
                            },
                            x: {
                                ticks: { font: { size: 9 }, color: 'var(--text-3)' },
                                grid: { display: false }
                            }
                        }
                    }
                });
            }
        }

        // Helper functions
        function generateSprintDays(count) {
            const days = [];
            for (let i = 0; i < count; i++) {
                days.push(`Day ${i + 1}`);
            }
            return days;
        }

        function generateIdealBurndown(total, days) {
            const dailyBurn = total / days;
            const data = [];
            for (let i = 0; i < days; i++) {
                data.push(Math.max(0, total - (dailyBurn * (i + 1))));
            }
            return data;
        }

        function generateActualBurndown(total, completed, days) {
            const data = [];
            const currentRemaining = total - completed;
            const variance = Math.random() * 0.3;
            
            for (let i = 0; i < days - 1; i++) {
                const progress = (i / (days - 1)) * completed;
                data.push(total - progress + (Math.random() - 0.5) * total * variance);
            }
            data.push(currentRemaining);
            return data.map(v => Math.max(0, v));
        }

        function generateCumulativeFlow(value, days) {
            const data = [];
            for (let i = 0; i < days; i++) {
                const progress = (i / days) * value;
                data.push(progress + (Math.random() - 0.5) * value * 0.1);
            }
            return data.map(v => Math.max(0, v));
        }

        function generateBurnupCompleted(completed, days) {
            const data = [];
            for (let i = 0; i < days; i++) {
                const progress = (i / days) * completed;
                data.push(progress + (Math.random() - 0.5) * completed * 0.15);
            }
            data[data.length - 1] = completed;
            return data.map(v => Math.max(0, v));
        }

        function generateBurnupTotal(total, days) {
            const data = [];
            for (let i = 0; i < days; i++) {
                const scopeCreep = (Math.random() - 0.3) * (total * 0.05);
                data.push(total + scopeCreep);
            }
            return data;
        }

        function updateLastFetched() {
            const now = new Date();
            lastUpdated.textContent = `Last updated: ${now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;
        }

        function showError(message) {
            errorContainer.innerHTML = `
                <div class="error">
                    <span class="error-icon">⚠️</span>
                    ${message}
                </div>
            `;
            analyticsContainer.style.display = 'block';
        }

        function startAutoRefresh() {
            if (autoRefreshInterval) clearInterval(autoRefreshInterval);
            autoRefreshInterval = setInterval(fetchAnalytics, 30000);
        }

        function stopAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
            }
        }

        // Close modal
        modalCloseBtn.addEventListener('click', () => {
            modalOverlay.classList.remove('active');
        });

        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) {
                modalOverlay.classList.remove('active');
            }
        });

        // Event listeners
        refreshBtn.addEventListener('click', fetchAnalytics);
        autoRefreshToggle.addEventListener('change', (e) => {
            if (e.target.checked) {
                startAutoRefresh();
            } else {
                stopAutoRefresh();
            }
        });

        // Initial load
        fetchAnalytics();

        // Load saved preferences
        const savedAutoRefresh = localStorage.getItem('trelloAutoRefresh') === 'true';
        if (savedAutoRefresh) {
            autoRefreshToggle.checked = true;
            startAutoRefresh();
        }

        autoRefreshToggle.addEventListener('change', (e) => {
            localStorage.setItem('trelloAutoRefresh', e.target.checked);
        });
    </script>
</body>
</html>
